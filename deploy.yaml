---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: otelcol
  namespace: telemetry
spec:
  progressDeadlineSeconds: 600
  replicas: 1
  revisionHistoryLimit: 10
  selector:
    matchLabels:
      k8s-app: otelcol
  strategy:
    type: Recreate
  template:
    metadata:
      creationTimestamp: null
      labels:
        k8s-app: otelcol
    spec:
      containers:
        - name: otelcol
          image: gautada/otelcol:0.148.0
          imagePullPolicy: Always
          ports:
            - containerPort: 4317
              name: grpc
              protocol: TCP
            - name: http
              containerPort: 4318
              protocol: TCP
            - name: prometheus
              containerPort: 8889
              protocol: TCP
          securityContext:
            privileged: true
          volumeMounts:
            - mountPath: /etc/otelcol
              name: config-volume
              readOnly: true
      restartPolicy: Always
      schedulerName: default-scheduler
      volumes:
        - configMap:
            defaultMode: 420
            items:
              - key: config.yaml
                path: config.yaml
            name: otelcol
          name: config-volume
